name: Sync Jai packages

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

concurrency:
  group: sync-packages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$SYNC_SECRET" ]; then
            echo "SYNC_URL and SYNC_SECRET repository secrets must be set." >&2
            exit 1
          fi
          echo "Triggering $SYNC_URL"
          http_code=$(curl -sS -o /tmp/sync-out.json -w "%{http_code}" \
            --max-time 600 \
            -X POST "$SYNC_URL" \
            -H "Authorization: Bearer $SYNC_SECRET" \
            -H "Content-Type: application/json")
          echo "HTTP $http_code"
          cat /tmp/sync-out.json
          echo
          [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]
